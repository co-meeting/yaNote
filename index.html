<!DOCTYPE html>
<!-- yaNote — 開発時のコーディング規約はリポジトリの CLAUDE.md を参照 -->
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <title>yaNote - ブラウザ上で動作するジグザグ型ノートアプリ | v1.6</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192x192.png" type="image/png">

  <!-- SEO対応のメタタグ -->
  <meta name="description"
    content="yaNoteはブラウザ上で直感的にアイデアを整理できるジグザグ型ノートアプリです。思考の整理や選択肢の検討に最適なシンプルで高速なUI、PWA対応でオフラインでも使用可能です。">
  <meta name="keywords" content="yaNote, ジグザグノート, マインドマップ, ブラウザアプリ, 思考整理, PWA, オフライン対応">
  <meta name="author" content="Takaaki Yano">

  <!-- OGP設定 -->
  <meta property="og:title" content="yaNote - ブラウザで動作するジグザグ型ノートアプリ">
  <meta property="og:description" content="ブラウザ上で直感的にアイデアを整理できるジグザグ型ノートアプリ。思考の整理や選択肢の検討に最適なシンプルなUI、PWA対応でオフラインでも使用可能。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://co-meeting.github.io/yaNote/">
  <meta property="og:image" content="https://co-meeting.github.io/yaNote/ogp-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="yaNote - ブラウザで動作するジグザグ型ノートアプリ">
  <meta name="twitter:description" content="ブラウザ上で直感的にアイデアを整理できるジグザグ型ノートアプリ。PWA対応でオフラインでも使用可能。">
  <meta name="twitter:image" content="https://co-meeting.github.io/yaNote/ogp-image.png">

  <link rel="shortcut icon" href="icons/icon-192x192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ===== コントロールパネル ===== -->
  <!-- コントロールパネルに新しいボタンを追加 -->
  <div id="controlPanel">
    <input type="text" id="titleField" value="" placeholder="タイトル" readonly>
    <button id="boldTextBtn">B</button>
    <button id="alignBtn" aria-label="整列" title="整列">▦</button>
    <button id="changeTypeBtn" class="standard">◻︎</button>
    <button id="changeLineTypeBtn">ー</button>
    <button id="changeDashTypeBtn">—</button>
    <button id="enclosureBtn" aria-label="囲み矩形" title="囲み矩形を描く">▭</button>
    <span class="panel-separator"></span>
    <button id="resetViewBtn" title="表示位置をリセット">⊙</button> <!-- 新しく追加 -->
    <span class="panel-separator"></span>
    <button id="fileMenuBtn" aria-label="ファイルメニュー" title="ファイルメニュー">☰</button>
    <button id="guideBtn">？</button>
    <input type="file" id="importInput" accept=".json">
  </div>
  <div id="fileMenu" aria-hidden="true">
    <button id="resetBtn">新規ノートを作成</button>
    <button id="importBtn">保存したノートを開く</button>
    <button id="exportBtn">現在のノートを保存</button>
    <button id="aiExportBtn">AI用Markdownで保存</button>
    <button id="shareBtn">URLで共有</button>
  </div>
  <div id="alignMenu" aria-hidden="true">
    <button type="button" data-align-action="left">左寄せ</button>
    <button type="button" data-align-action="right">右寄せ</button>
    <button type="button" data-align-action="top">上寄せ</button>
    <button type="button" data-align-action="bottom">下寄せ</button>
    <button type="button" data-align-action="center-x">左右中央揃え</button>
    <button type="button" data-align-action="center-y">上下中央揃え</button>
    <button type="button" data-align-action="horizontal">横等間隔</button>
    <button type="button" data-align-action="vertical">縦等間隔</button>
  </div>
  <div id="canvas">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- マーカー定義（すべての矢印マーカーの色を #404040 に統一） -->
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"
          markerUnits="strokeWidth">
          <path d="M0,0 L0,10 L10,5 Z" fill="#404040" />
        </marker>
        <marker id="no-arrow" markerWidth="0" markerHeight="0" refX="0" refY="0" orient="auto"
          markerUnits="strokeWidth"></marker>
        <marker id="start-arrow" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto"
          markerUnits="strokeWidth">
          <path d="M10,0 L10,10 L0,5 Z" fill="#404040" />
        </marker>
        <marker id="both-end-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"
          markerUnits="strokeWidth">
          <path d="M0,0 L0,10 L10,5 Z" fill="#404040" />
        </marker>
        <marker id="both-start-arrow" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto"
          markerUnits="strokeWidth">
          <path d="M10,0 L10,10 L0,5 Z" fill="#404040" />
        </marker>
      </defs>
    </svg>
  </div>
  <!-- ===== ズーム率表示 ===== -->
  <div id="zoomDisplay">100%</div>

  <!-- ===== アプリ本体 ===== -->
  <script src="app.js"></script>
  <!-- ===== 共有モーダル ===== -->
  <div id="shareModalOverlay" class="modal-overlay"></div>
  <div id="shareModal">
    <h3 class="modal-title">JSONファイルのURLを共有</h3>
    <p>JSONファイルのURLを入力してください：</p>
    <input type="text" id="jsonUrlInput" placeholder="https://example.com/path/to/your/note.json">
    <div id="generatedUrlContainer" style="display:none;">
      <p>生成されたURL：</p>
      <input type="text" id="generatedUrlInput" readonly>
      <p class="copy-message" style="display:none; color:green;">URLをコピーしました！</p>
    </div>
    <div class="modal-buttons">
      <button id="cancelShareBtn">キャンセル</button>
      <button id="generateUrlBtn" class="primary">URL作成</button>
      <button id="copyUrlBtn" style="display:none;" class="primary">URLをコピー</button>
    </div>
  </div>
  <!-- Copyright 表示 -->
  <div id="copyright">
    © 2026 Takaaki Yano | yaNote v1.6
  </div>
</body>

</html>
